services:
  - type: web
    name: phone-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_startup.sh
    port: 10000
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: LLM_PROVIDER
        value: gemini
      - key: STT_PROVIDER
        value: google
      - key: TTS_PROVIDER
        value: google
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # ── 프롬프트 설계 영속화 ─────────────────────
      # /prompt에서 저장 시 자동 업데이트됨 (재배포 후 복원용)
      - key: DESIGN_JSON
        sync: false
      # Render API 키 (설계 자동 백업용) — 선택사항
      # Render Dashboard → Account Settings → API Keys에서 발급
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
