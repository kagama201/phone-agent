services:
  - type: web
    name: phone-ai-agent
    runtime: python
    runtimeVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_startup.sh
    plan: free

    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: STT_PROVIDER
        value: google
      - key: TTS_PROVIDER
        value: google
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
