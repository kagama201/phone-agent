services:
  - type: web
    name: phone-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_startup.sh
    plan: free

    envVars:
      # ── 공급자 선택 ───────────────────────────
      - key: LLM_PROVIDER
        value: gemini
      - key: STT_PROVIDER
        value: google
      - key: TTS_PROVIDER
        value: google

      # ── Gemini LLM ────────────────────────────
      # Google AI Studio → Get API Key (무료)
      # https://aistudio.google.com
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite

      # ── Google Cloud STT + TTS ─────────────────
      # 서비스 계정 JSON 파일 내용 전체를 붙여넣기
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false

      # ── Twilio ────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # ── 시스템 프롬프트 (선택, 기본값 사용 가능) ──
      # - key: SYSTEM_PROMPT
      #   value: "당신은 친절한 AI 전화 상담사 '아리'입니다. 응답은 2~3문장 이내 구어체로 말하세요."

      # ── 대안 LLM (LLM_PROVIDER=claude 시 활성화) ─
      # - key: ANTHROPIC_API_KEY
      #   sync: false
